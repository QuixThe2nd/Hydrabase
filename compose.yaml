services:
  hydrabase:
    image: ghcr.io/quixthe2nd/hydrabase
    container_name: hydrabase
    restart: always
    network_mode: host # Can be replaced with ports if not using UPnP
    # ports: # Ports must be manually forwarded if uncommented - Whitelist 4545 in your firewall
    #   - 4545:4545/tcp # MUST be same port as defined in environment variable
    #   - 4545:4545/udp # MUST be same port as defined in environment variable
    volumes:
      - ./data:/app/data
    environment:
      USERNAME: Anonymous
      # API_KEY: $API_KEY - Use `openssl rand -hex 16` to generate an api key

      # Uncomment to enable Spotify plugin:
      # SPOTIFY_CLIENT_ID: $SPOTIFY_CLIENT_ID
      # SPOTIFY_CLIENT_SECRET: $SPOTIFY_CLIENT_SECRET

      # Defaults:
      # PORT: 4545 # MUST be between 4000-5000
      # domain: [external ip]
      # LISTEN_ADDRESS: 0.0.0.0
      # PUID: 1000
      # PGID: 1000

      # Telemetry is disabled by default. Consider enabling it to help me make Hydrabase more stable.
      # By enabling telemetry, I can notice and fix bugs your node faces without you needing to report it.
      HYDRABASE_TELEMETRY: false

      # Advanced:
      # REQUIRE_DHT_READY: true
      # PREFER_TRANSPORT: TCP # TCP or UDP
