name: Run P2P Node

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: p2p-node
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Start node
        run: timeout 21000 bun start