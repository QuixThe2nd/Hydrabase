name: Cleanup PR Docker Image

on:
  pull_request:
    branches: [main]
    types: [closed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quixthe2nd/hydrabase

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete PR image
        uses: actions/delete-package-versions@v5
        with:
          package-name: hydrabase
          package-type: container
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-only-untagged-versions: false
          ignore-versions: '^(latest|\d+\.\d+\.\d+)$'
          min-versions-to-keep: 0
          query: pr-${{ github.event.pull_request.number }}
