name: Test Node

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: test-node
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      USERNAME: "GithubDevNode"
      BRANCH: "dev"
      REQUIRE_DHT_READY: "false"
      HYDRABASE_TELEMETRY: "true"
      PREFER_TRANSPORT: "UDP"
      BIO: "This node is running in a GitHub action. If you can connect, you can connect to nodes with strict networks."

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Start node
        shell: bash
        run: |
          set -euo pipefail

          # End the long-running process before GitHub's hard timeout.
          status=0
          timeout 21000 bun start || status=$?

          # timeout exits with 124 when duration is reached; treat that as expected.
          if [[ "$status" -ne 0 && "$status" -ne 124 ]]; then
            exit "$status"
          fi

      - name: Queue next run on dev
        if: ${{ !cancelled() && github.ref_name == 'dev' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test-node.yaml',
              ref: 'dev'
            });
