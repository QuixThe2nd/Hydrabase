services:
  hydrabase:
#    build: .
    image: ghcr.io/quixthe2nd/hydrabase
    container_name: hydrabase
    network_mode: host
    ports:
      - 4544:4544/tcp
      - 45455:45455/udp
    volumes:
      #- ./data:/app/data
      - /mnt/user/appdata/hydrabase/data:/app/data
    environment:
      PUID: 1000
      PGID: 1000
      DHT_PORT: 45455
      SERVER_PORT: 4544
      HOST: 0.0.0.0
      API_KEY: YOUR_API_KEY_HERE
      #SPOTIFY_CLIENT_ID: $SPOTIFY_CLIENT_ID
      #SPOTIFY_CLIENT_SECRET: $SPOTIFY_CLIENT_SECRET
      #USERNAME: Aservices: