version: '3.8'

services:
  hydrabase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-hydrabase
    ports:
      - "4545:4545/tcp"
      - "4545:4545/udp"
    environment:
      - NODE_ENV=production
      - DOMAIN=49.186.30.234:4545
    volumes:
      - hydrabase_data:/app/data
    restart: unless-stopped
    networks:
      - hydrabase_net

volumes:
  hydrabase_data:

networks:
  hydrabase_net:
    driver: bridge