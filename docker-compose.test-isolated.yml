version: '3.8'

# This configuration creates two nodes that bootstrap from each other
# Node1 bootstraps from Node2, and Node2 bootstraps from Node1

services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydrabase-node1
    hostname: node1
    networks:
      hydratest:
        ipv4_address: 172.20.0.10
    ports:
      - "4545:4545/tcp"
      - "4545:4545/udp"
    volumes:
      - ./test-data/node1:/app/data
      - ./src:/app/src:ro
    environment:
      USERNAME: Node1
      PORT: 4545
      DOMAIN: 172.20.0.10
      LISTEN_ADDRESS: 0.0.0.0
      PUID: 1000
      PGID: 1000
      REQUIRE_DHT_CONNECTION: "false"
      PREFER_TRANSPORT: TCP
      # Bootstrap from node2
      BOOTSTRAP_PEERS: "172.20.0.11:4545"
      DHT_BOOTSTRAP_NODES: "172.20.0.11:4545"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4545/auth"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydrabase-node2
    hostname: node2
    networks:
      hydratest:
        ipv4_address: 172.20.0.11
    ports:
      - "4546:4545/tcp"
      - "4546:4545/udp"
    volumes:
      - ./test-data/node2:/app/data
      - ./src:/app/src:ro
    environment:
      USERNAME: Node2
      PORT: 4545
      DOMAIN: 172.20.0.11
      LISTEN_ADDRESS: 0.0.0.0
      PUID: 1000
      PGID: 1000
      REQUIRE_DHT_CONNECTION: "false"
      PREFER_TRANSPORT: TCP
      # Bootstrap from node1
      BOOTSTRAP_PEERS: "172.20.0.10:4545"
      DHT_BOOTSTRAP_NODES: "172.20.0.10:4545"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4545/auth"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

networks:
  hydratest:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
